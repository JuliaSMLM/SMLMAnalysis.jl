[deps]
Documenter = "e30172f5-a6a5-5a46-863b-614d45cd2de4"
SMLMAnalysis = "5ba66956-a7ba-489c-b260-90fb8f3af39c"
SMLMBaGoL = "70c4bcd9-ed9a-43d6-baf8-7d0db1eb70ee"
SMLMClustering = "5e733723-370a-41a4-ac41-ff3a91b0b806"
SMLMDriftCorrection = "34bda2d1-2fff-475a-a8c4-7f53d4251312"

# Source override for the doc build: SMLMAnalysis itself is unregistered, so the
# docs env must build against this checkout (path = "..", relative to
# julia_shared_dev/SMLMAnalysis/docs — NOT a worktree). Everything else now
# resolves from the General registry, including SMLMBaGoL and SMLMClustering
# (both registered), so no other source overrides are needed. The old
# ../../SMLMBaGoL / ../../SMLMClustering path overrides broke the CI docs build,
# where those sibling checkouts don't exist.
[sources]
SMLMAnalysis = {path = ".."}
