<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 600" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5a6577"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="2" flood-color="#1f2a3a" flood-opacity="0.18"/>
    </filter>
    <style>
      .mono { font-family: "SFMono-Regular", Menlo, Consolas, monospace; }
      .title { font-weight: 700; }
      .sub { fill: #5b6b80; font-size: 14px; }
      .card-t { fill: #1f3a5f; font-size: 16px; }
    </style>
  </defs>

  <!-- figure panel -->
  <rect x="1" y="1" width="1238" height="598" rx="14" fill="#fcfcfe" stroke="#e3e7ee"/>

  <!-- header -->
  <text x="40" y="50" class="mono title" font-size="26" fill="#1b2330">(result, info) = analyze(data, config)</text>
  <text x="40" y="78" class="sub" font-size="15">One call runs an ordered list of typed step configs. Steps are freely composable — dispatch on the config type selects each step.</text>

  <!-- ===== main pipeline row (y=120..196) ===== -->
  <!-- input: raw movie -->
  <g filter="url(#shadow)">
    <rect x="40" y="120" width="138" height="76" rx="10" fill="#eceef2" stroke="#8a94a3"/>
  </g>
  <text x="109" y="152" text-anchor="middle" class="card-t title" fill="#3a4250" font-size="16">Raw movie</text>
  <text x="109" y="173" text-anchor="middle" class="sub" font-size="13">image stack(s)</text>

  <!-- step cards -->
  <!-- 2 DetectFit -->
  <g filter="url(#shadow)"><rect x="208" y="120" width="150" height="76" rx="10" fill="#eef3fb" stroke="#3b6fb0"/></g>
  <text x="283" y="150" text-anchor="middle" class="mono card-t title">DetectFitConfig</text>
  <text x="283" y="172" text-anchor="middle" class="sub">detect + MLE fit</text>
  <!-- 3 Filter -->
  <g filter="url(#shadow)"><rect x="388" y="120" width="150" height="76" rx="10" fill="#eef3fb" stroke="#3b6fb0"/></g>
  <text x="463" y="150" text-anchor="middle" class="mono card-t title">FilterConfig</text>
  <text x="463" y="172" text-anchor="middle" class="sub">quality cuts (QC)</text>
  <!-- 4 FrameConnect -->
  <g filter="url(#shadow)"><rect x="568" y="120" width="160" height="76" rx="10" fill="#eef3fb" stroke="#3b6fb0"/></g>
  <text x="648" y="150" text-anchor="middle" class="mono card-t title" font-size="15">FrameConnectConfig</text>
  <text x="648" y="172" text-anchor="middle" class="sub">link blinks + calibrate</text>
  <!-- 5 Drift -->
  <g filter="url(#shadow)"><rect x="758" y="120" width="150" height="76" rx="10" fill="#eef3fb" stroke="#3b6fb0"/></g>
  <text x="833" y="150" text-anchor="middle" class="mono card-t title">DriftConfig</text>
  <text x="833" y="172" text-anchor="middle" class="sub">drift correction</text>
  <!-- 6 Render -->
  <g filter="url(#shadow)"><rect x="938" y="120" width="150" height="76" rx="10" fill="#eef3fb" stroke="#3b6fb0"/></g>
  <text x="1013" y="150" text-anchor="middle" class="mono card-t title">RenderConfig</text>
  <text x="1013" y="172" text-anchor="middle" class="sub">super-res image</text>
  <!-- output: Results -->
  <g filter="url(#shadow)"><rect x="1118" y="120" width="82" height="76" rx="10" fill="#e9f6ee" stroke="#2e9e5b"/></g>
  <text x="1159" y="150" text-anchor="middle" class="title" fill="#1d6b3f" font-size="15">Result</text>
  <text x="1159" y="172" text-anchor="middle" class="sub" font-size="12">+ info</text>

  <!-- arrows between main cards -->
  <g stroke="#5a6577" stroke-width="2.4" marker-end="url(#arrow)">
    <line x1="180" y1="158" x2="206" y2="158"/>
    <line x1="360" y1="158" x2="386" y2="158"/>
    <line x1="540" y1="158" x2="566" y2="158"/>
    <line x1="730" y1="158" x2="756" y2="158"/>
    <line x1="910" y1="158" x2="936" y2="158"/>
    <line x1="1090" y1="158" x2="1116" y2="158"/>
  </g>

  <!-- ===== provenance band ===== -->
  <text x="40" y="250" class="sub" font-size="15" fill="#445">Every step returns <tspan class="mono" fill="#1b2330">(smld, info)</tspan> — the smld threads to the next step; <tspan class="mono" fill="#1b2330">info</tspan> records provenance and writes:</text>
  <g font-size="13" class="mono" fill="#5b6b80">
    <rect x="40" y="264" width="118" height="26" rx="13" fill="#f3f4f7" stroke="#d7dce5"/><text x="99" y="281" text-anchor="middle">config.toml</text>
    <rect x="168" y="264" width="96" height="26" rx="13" fill="#f3f4f7" stroke="#d7dce5"/><text x="216" y="281" text-anchor="middle">stats.md</text>
    <rect x="274" y="264" width="150" height="26" rx="13" fill="#f3f4f7" stroke="#d7dce5"/><text x="349" y="281" text-anchor="middle">diagnostic figures</text>
    <rect x="434" y="264" width="170" height="26" rx="13" fill="#f3f4f7" stroke="#d7dce5"/><text x="519" y="281" text-anchor="middle">checkpoints (.h5/.jld2)</text>
  </g>

  <!-- divider -->
  <line x1="40" y1="330" x2="1200" y2="330" stroke="#e3e7ee" stroke-width="1.5"/>

  <!-- ===== optional steps / side branches ===== -->
  <text x="40" y="368" class="title" font-size="17" fill="#1b2330">Optional steps — drop in anywhere by adding its config (same <tspan class="mono">analyze</tspan> dispatch)</text>

  <!-- row of dashed amber cards -->
  <g>
    <g filter="url(#shadow)"><rect x="40" y="392" width="192" height="74" rx="10" fill="#fbf7ec" stroke="#c9a13b" stroke-dasharray="5 4"/></g>
    <text x="136" y="421" text-anchor="middle" class="mono title" fill="#7a5d12" font-size="13">IntensityFilterConfig</text>
    <text x="136" y="442" text-anchor="middle" class="sub" font-size="12.5">reject multi-emitter</text>

    <g filter="url(#shadow)"><rect x="248" y="392" width="176" height="74" rx="10" fill="#fbf7ec" stroke="#c9a13b" stroke-dasharray="5 4"/></g>
    <text x="336" y="421" text-anchor="middle" class="mono title" fill="#7a5d12" font-size="13">DensityFilterConfig</text>
    <text x="336" y="442" text-anchor="middle" class="sub" font-size="12.5">drop isolated locs</text>

    <g filter="url(#shadow)"><rect x="440" y="392" width="140" height="74" rx="10" fill="#fbf7ec" stroke="#c9a13b" stroke-dasharray="5 4"/></g>
    <text x="510" y="421" text-anchor="middle" class="mono title" fill="#7a5d12" font-size="13">BaGoLConfig</text>
    <text x="510" y="442" text-anchor="middle" class="sub" font-size="12.5">Bayesian grouping</text>

    <g filter="url(#shadow)"><rect x="596" y="392" width="188" height="74" rx="10" fill="#fbf7ec" stroke="#c9a13b" stroke-dasharray="5 4"/></g>
    <text x="690" y="421" text-anchor="middle" class="mono title" fill="#7a5d12" font-size="13">cluster · stats</text>
    <text x="690" y="442" text-anchor="middle" class="sub" font-size="12">DBSCAN · Voronoi · Hopkins</text>

    <g filter="url(#shadow)"><rect x="800" y="392" width="176" height="74" rx="10" fill="#f3eefb" stroke="#7d54b8" stroke-dasharray="5 4"/></g>
    <text x="888" y="421" text-anchor="middle" class="mono title" fill="#523083" font-size="13">MultiTargetConfig</text>
    <text x="888" y="442" text-anchor="middle" class="sub" font-size="12.5">N channels → composite</text>
  </g>

  <text x="40" y="506" class="sub" font-size="14.5" fill="#445">Order is up to you: <tspan class="mono" fill="#1b2330">DetectFitConfig</tspan> must come first; the rest are freely orderable, repeatable, or omitted. A wrong order is a <tspan class="mono" fill="#1b2330">MethodError</tspan>, not a silent bug.</text>

  <!-- ecosystem credit -->
  <text x="40" y="556" class="sub" font-size="13.5" fill="#7a8699">Each step is backed by a dedicated JuliaSMLM package — SMLMAnalysis composes them into one reproducible pipeline.</text>
</svg>
